<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ClassFlow Feedback Responses</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f1117;
      --surface: #171b24;
      --border: #2a3142;
      --text: #e8edf9;
      --muted: #92a0c2;
      --accent: #6c8aff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      padding: 32px;
      background:
        radial-gradient(circle at top, rgba(108,138,255,0.16), transparent 35%),
        var(--bg);
      color: var(--text);
      font-family: "DM Sans", sans-serif;
    }
    .shell { max-width: 980px; margin: 0 auto; }
    h1 { font-family: "Syne", sans-serif; font-size: clamp(2rem, 4vw, 3.4rem); margin: 0 0 8px; }
    .subtitle { color: var(--muted); margin-bottom: 24px; }
    .grid { display: grid; gap: 14px; }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 18px;
    }
    .meta { display: flex; justify-content: space-between; gap: 12px; flex-wrap: wrap; margin-bottom: 10px; }
    .badge {
      display: inline-flex;
      padding: 5px 10px;
      border-radius: 999px;
      background: rgba(108,138,255,0.14);
      color: #b9c9ff;
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .muted { color: var(--muted); font-size: 0.88rem; }
    .empty {
      padding: 22px;
      border: 1px dashed var(--border);
      border-radius: 18px;
      color: var(--muted);
      text-align: center;
    }
  </style>
</head>
<body>
  <main class="shell">
    <h1>Feedback Responses</h1>
    <p class="subtitle">Ideas, wishes, and bug reports submitted from the ClassFlow app.</p>
    <div id="feedback-list" class="grid">
      <div class="empty">Loading feedback...</div>
    </div>
  </main>
  <script type="module" src="js/feedback-responses.js"></script>
</body>
</html>
