
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ClassFlow</title>
  <link rel="stylesheet" href="styles/main.css" />
  <link rel="stylesheet" href="styles/themes.css" />
  <link rel="stylesheet" href="styles/animations.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
</head>
<body class="theme-dark-default" data-page="loading">

  <!-- ═══════════════════════════════════════════
       LOADING SCREEN
  ═══════════════════════════════════════════ -->
  <div id="loading-screen" class="loading-screen">
    <div class="loading-inner">
      <div class="loading-logo">
<div class="logo-mark app-logo-graphic"></div>
        <div class="logo-text-wrap">
          <span class="logo-text-class">Class</span><span class="logo-text-flow">Flow</span>
        </div>
      </div>
      <div class="loading-bar-wrap">
        <div class="loading-bar"><div class="loading-bar-fill"></div></div>
      </div>
      <p class="loading-status">Initializing workspace...</p>
    </div>
    <div class="loading-particles" id="loading-particles"></div>
  </div>

  <!-- ═══════════════════════════════════════════
       AUTH SCREEN
  ═══════════════════════════════════════════ -->
  <div id="auth-screen" class="auth-screen hidden">
    <div class="auth-bg-anim">
      <div class="auth-wave w1"></div>
      <div class="auth-wave w2"></div>
      <div class="auth-wave w3"></div>
    </div>
    <div class="auth-card">
      <div class="auth-logo">
<div class="logo-mark app-logo-graphic small"></div>
        <div class="logo-text-wrap">
          <span class="logo-text-class">Class</span><span class="logo-text-flow">Flow</span>
        </div>
      </div>
      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login">Sign In</button>
        <button class="auth-tab" data-tab="signup">Create Account</button>
      </div>
      <div class="auth-form-wrap">
        <!-- Login -->
        <div id="login-form" class="auth-form active">
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="login-email" placeholder="teacher@school.edu" autocomplete="email"/>
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password"/>
          </div>
          <button class="btn-auth" id="login-btn">
            <span>Sign In</span>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
          </button>
          <p class="auth-error hidden" id="login-error"></p>
        </div>
        <!-- Signup -->
        <div id="signup-form" class="auth-form">
          <div class="form-group">
            <label>Your Name</label>
            <input type="text" id="signup-username" placeholder="Ms. Johnson" autocomplete="name"/>
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="signup-email" placeholder="teacher@school.edu" autocomplete="email"/>
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="signup-password" placeholder="Min. 6 characters" autocomplete="new-password"/>
          </div>
          <button class="btn-auth" id="signup-btn">
            <span>Create Account</span>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
          </button>
          <p class="auth-error hidden" id="signup-error"></p>
        </div>
      </div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════
       MAIN APP SHELL
  ═══════════════════════════════════════════ -->
  <div id="app" class="app hidden">

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-logo">
<div class="logo-mark app-logo-graphic"></div>
        <span class="sidebar-logo-text"><span class="logo-text-class">Class</span><span class="logo-text-flow">Flow</span></span>
      </div>

      <nav class="sidebar-nav">
        <a class="nav-item active" data-view="dashboard" title="Dashboard">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          <span>Dashboard</span>
        </a>
        <a class="nav-item" data-view="timer" title="Timer">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="13" r="8"/><path d="M12 9v4l3 3"/><path d="M9.5 2.5h5"/><path d="M12 2.5V5"/></svg>
          <span>Timer</span>
        </a>
        <a class="nav-item" data-view="wheel" title="Random Wheel">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="2"/><path d="M12 3v9M12 12l6.5 6.5"/></svg>
          <span>Wheel</span>
        </a>
        <a class="nav-item" data-view="groups" title="Groups">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
          <span>Groups</span>
        </a>
        <a class="nav-item" data-view="scoreboard" title="Scoreboard">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg>
          <span>Scoreboard</span>
        </a>
        <a class="nav-item" data-view="qr" title="QR Code">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="17" y="17" width="3" height="3" rx="0.5"/><rect x="12" y="12" width="3" height="3" rx="0.5"/><path d="M12 17h3v3"/></svg>
          <span>QR Code</span>
        </a>
        <a class="nav-item" data-view="grades" title="Grade Calculator">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
          <span>Grades</span>
        </a>
        <a class="nav-item" data-view="links" title="Quick Links">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg>
          <span>Links</span>
        </a>
        <a class="nav-item" data-view="notes" title="Notes">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M7 3h7l5 5v13H7a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2Z"/><path d="M14 3v5h5"/><path d="M9 13h6M9 17h4M9 9h2"/></svg>
          <span>Notes</span>
        </a>
        <a class="nav-item" data-view="draw" title="Draw">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="m4 20 4.5-1 9.6-9.6a2.1 2.1 0 0 0-3-3L5.5 16 4 20Z"/><path d="m13.5 6.5 4 4"/></svg>
          <span>Draw</span>
        </a>
        <a class="nav-item" data-view="camera" title="Camera">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
          <span>Camera</span>
        </a>
        <a class="nav-item" data-view="controller" title="Controller">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="7" width="20" height="14" rx="3"/><path d="M16 3h-1a4 4 0 00-4 4v14"/><path d="M8 3h1a4 4 0 014 4"/></svg>
          <span>Controller</span>
        </a>
        <a class="nav-item" data-view="feedback" title="Feedback">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2Z"/><path d="M8 9h8M8 13h5"/></svg>
          <span>Feedback</span>
        </a>
      </nav>

      <div class="sidebar-bottom">
        <button class="nav-item" id="settings-btn" title="Settings">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
          <span>Settings</span>
        </button>
        <button class="nav-item logout" id="logout-btn" title="Sign Out">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16,17 21,12 16,7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          <span>Sign Out</span>
        </button>
      </div>
    </aside>

    <!-- MAIN CONTENT -->
    <div class="main-wrap">

      <!-- TOPBAR -->
      <header class="topbar">
        <div class="topbar-left">
          <button class="sidebar-toggle" id="sidebar-toggle">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </button>
          <div class="class-selector-wrap">
            <select id="class-selector" class="class-selector">
              <option value="">— Select Class —</option>
            </select>
            <button class="btn-icon" id="add-class-btn" title="New Class">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            </button>
          </div>
        </div>
        <div class="topbar-right">
          <div class="controller-status" id="controller-status" title="Controller Status">
            <span class="status-dot" id="status-dot"></span>
            <span id="status-label">No Controller</span>
          </div>
          <button class="btn btn-secondary btn-sm" id="join-controller-btn">Join Remote</button>
          <div class="theme-picker-wrap">
            <button class="btn-icon theme-btn" id="theme-toggle-btn" title="Change Theme">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 3a9 9 0 0 0 0 18h1.2a2.3 2.3 0 0 0 0-4.6h-1.1a2 2 0 0 1 0-4h3.1A5.8 5.8 0 1 0 12 3Z"/><circle cx="7.5" cy="10.5" r="1"/><circle cx="12" cy="7.5" r="1"/><circle cx="16.5" cy="10.5" r="1"/></svg>
            </button>
            <div class="theme-dropdown hidden" id="theme-dropdown"></div>
          </div>
          <div class="user-chip" id="user-chip">
            <span id="user-initial">?</span>
            <span id="user-name-display">Teacher</span>
          </div>
        </div>
      </header>

      <!-- VIEW CONTAINER -->
      <main class="view-container" id="view-container">
        <!-- Views injected by JS -->
      </main>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════
       OVERLAY MESSAGE (Controller Feature)
  ═══════════════════════════════════════════ -->
  <div id="overlay-message" class="overlay-message hidden">
    <div class="overlay-message-inner">
      <p id="overlay-message-text"></p>
      <button onclick="document.getElementById('overlay-message').classList.add('hidden')">✕</button>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════
       MODALS
  ═══════════════════════════════════════════ -->
  <div id="modal-backdrop" class="modal-backdrop hidden">
    <div class="modal" id="modal">
      <div class="modal-header">
        <h3 id="modal-title"></h3>
        <button class="modal-close" id="modal-close">✕</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════
       TOAST NOTIFICATIONS
  ═══════════════════════════════════════════ -->
  <div id="toast-container" class="toast-container"></div>

  <!-- ALARM AUDIO -->
  <audio id="alarm-audio" preload="auto">
    <!-- Generated via Web Audio API in JS -->
  </audio>

  <!-- ═══════════════════════════════════════════
       FIREBASE + APP SCRIPTS
  ═══════════════════════════════════════════ -->
  <script type="module" src="js/firebase-init.js"></script>
  <script type="module" src="js/auth.js"></script>
  <script type="module" src="js/app.js"></script>
  <script type="module" src="js/themes.js"></script>
  <script type="module" src="js/views/dashboard.js"></script>
  <script type="module" src="js/views/timer.js"></script>
  <script type="module" src="js/views/wheel.js"></script>
  <script type="module" src="js/views/groups.js"></script>
  <script type="module" src="js/views/scoreboard.js"></script>
  <script type="module" src="js/views/qr.js"></script>
  <script type="module" src="js/views/grades.js"></script>
  <script type="module" src="js/views/links.js"></script>
  <script type="module" src="js/views/notes.js"></script>
  <script type="module" src="js/views/draw.js"></script>
  <script type="module" src="js/views/feedback.js"></script>
  <script type="module" src="js/views/camera.js"></script>
  <script type="module" src="js/views/controller.js"></script>
  <script type="module" src="js/views/settings.js"></script>
</body>
</html>
