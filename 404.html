<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found | ClassFlow</title>
  <link rel="stylesheet" href="styles/main.css">
  <link rel="stylesheet" href="styles/themes.css">
  <style>
    .error-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
      padding: 20px;
    }
    .error-code {
      font-family: 'Syne', sans-serif;
      font-size: 8rem;
      font-weight: 800;
      color: var(--accent);
      margin: 0;
      line-height: 1;
    }
    .error-message {
      font-size: 1.5rem;
      color: var(--text);
      margin: 20px 0;
    }
    .back-btn {
      margin-top: 20px;
      padding: 12px 24px;
      background: var(--accent);
      color: var(--accent-text);
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body class="theme-dark-default"> <div class="error-container">
    <div class="logo-mark" style="margin-bottom: 20px;">
        </div>
    <h1 class="error-code">404</h1>
    <p class="error-message">Oops! This classroom doesn't exist.</p>
    <p class="error-message">Or youre being sneaky!</p>

    <a href="index.html" class="back-btn">Return to Dashboard</a>
  </div>
</body>
</html>
